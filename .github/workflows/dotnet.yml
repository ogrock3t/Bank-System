name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: dotnet restore BankSystem.sln
      - run: dotnet build BankSystem.sln --no-restore --configuration Release
      - run: dotnet test BankSystem.sln --no-build --configuration Release